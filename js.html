<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<script>
    // Variable global para el contenedor (o se pasa como parámetro)
    let contenedorContactos = null;

    const ICONO_CHECK = 'bi-check2-square';
    const ICONO_PAPELERA = 'bi-trash';
    const ICONO_CONTACTO = 'bi-person-plus-fill';
    const ICONO_ERROR = 'bi-bug';
    const ICONO_ADVERTENCIA = 'bi-exclamation-square';

    /*
    const ICONO_CHECK = 'https://assets2.lottiefiles.com/packages/lf20_hggjntuc.json';        // ✅ Éxito (check)
    const ICONO_ERROR = 'https://assets4.lottiefiles.com/packages/lf20_hxtfbaji.json';        // ✅ Error (X)
    const ICONO_CONTACTO = 'https://assets7.lottiefiles.com/packages/lf20_bbn0nkfr.json';     // ✅ Contacto (persona)
    const ICONO_PAPELERA = 'https://assets5.lottiefiles.com/packages/lf20_v0zapc2p.json';     // ✅ Papelera (borrar)
    const ICONO_ADVERTENCIA = 'https://assets3.lottiefiles.com/packages/lf20_x1rjkqww.json';  // ✅ Advertencia
   */

    function contactoInsertadoOk() {
        // eliminamos los datos de los input
        document.getElementById('nombre').value = "";
        document.getElementById('apellidos').value = "";
        document.getElementById('correo').value = "";
        document.getElementById('telf').value = "";
        // mostrar notificacion
        crearNotificacionContacto('Contacto insertado correctamente', 'Contacto Ok');
        //eliminar loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    function contactoInsertadoError() {
        // eliminamos los datos de los input
        document.getElementById('nombre').value = "";
        document.getElementById('apellidos').value = "";
        document.getElementById('correo').value = "";
        document.getElementById('telf').value = "";
        //Mostrad notificacion
        crearNotificacionError('No se ha insertado correctamente', 'Error Contacto');
        //elimnar Loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    function crearTablaContactos() {
        // Obtener referencia al contenedor
        contenedorContactos = document.getElementById('divContactos');
        if (!contenedorContactos) return;
        // Eliminar tabla existente
        eliminarTabla();
        eliminarLoader();

        contenedorContactos.innerHTML = '';      // Limpia mensajes residuales
        crearLoader('divContactos');
        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(crearTablaContactosOk)
            .withFailureHandler(crearTablaContactosError)  // nombre corregido
            .obtenerContactos();
    }

    function crearTablaContactosOk(obj) {
        // Validar datos
        if (!obj || obj.length === 0) {
            contenedorContactos.innerHTML = '<p class="alert alert-warning">No hay contactos.</p>';
            return;
        }
        // Crear tabla nueva
        let tabla = document.createElement('table');
        tabla.id = 'tablaContactos';
        let thead = document.createElement('thead');
        let tbody = document.createElement('tbody');
        // header de la tabla
        let primeraFila = document.createElement('tr');

        for (let i = 0; i < obj[0].length; i++) {
            let celda = document.createElement('td');
            celda.textContent = obj[0][i];
            primeraFila.appendChild(celda);
        }

        // agregar columna OPCIONES
        let celdaOpciones = document.createElement('td');
        celdaOpciones.textContent = 'OPCIONES';
        celdaOpciones.classList.add('text-center');
        primeraFila.appendChild(celdaOpciones);

        //agregar la fila del HEADER
        thead.appendChild(primeraFila); ////datos cabecera
        tabla.appendChild(thead);
        //body de la tabla
        for (let i = 1; i < obj.length; i++) {
            let fila = document.createElement('tr');
            for (let j = 0; j < obj[i].length; j++) {
                let celda = document.createElement('td');
                celda.textContent = obj[i][j];
                fila.appendChild(celda);

                // si es el último elemento
                if (j == 4){
                    // crear imagen
                    celda.textContent = '';
                    let imagen = document.createElement('img');
                    imagen.classList.add('img-fluid','rounded');
                    imagen.src = obj[i][j];
                    celda.appendChild(imagen);

                }
            }
            //agregar  botones
            //fila.appendChild(crearCeldaBotones(i + 1));
            fila.appendChild(crearCeldaBotones(i + 1, obj[i]));
            tbody.appendChild(fila);
        }

        // Estilos
        thead.classList.add('table-dark');
        tabla.classList.add('table', 'table-striped', 'border', 'border-4', 'table-dark', 'border-dark');
        tabla.appendChild(thead);
        tabla.appendChild(tbody);

        // Limpiar y mostrar
        contenedorContactos.innerHTML = '';
        contenedorContactos.appendChild(tabla);

        // Opcional: notificación de éxito
        crearNotificacionOk('Contactos cargados correctamente', 'Éxito');
    }

    function crearCeldaBotones(numFila, datosContacto) {
        let celda = document.createElement('td');
        celda.classList.add('text-center');
        //crear boton borrar
        let botonBorrar = document.createElement('button');
        botonBorrar.onclick = () => borrarContacto(numFila);
        botonBorrar.classList.add('btn', 'btn-danger', 'm-1');
        //botonBorrar.textContent = 'Borrar';
        //icono borrar
        let iconoBorrar = document.createElement('i');
        iconoBorrar.classList.add('bi', 'bi-trash');
        botonBorrar.appendChild(iconoBorrar);

        //crear boton modificar
        let botonModificar = document.createElement('button');
        botonModificar.onclick = () => abrirModalModificarContacto(numFila, datosContacto);
        //abrirModalModificarContacto(numFila, datosContacto);

        botonModificar.classList.add('btn', 'btn-warning', 'm-1');
        //botonModificar.textContent = 'Modificar';

        //icono borrar
        let iconoModificar = document.createElement('i');
        iconoModificar.classList.add('bi', 'bi-pencil-square');
        botonModificar.appendChild(iconoModificar);

        //agregar botones
        celda.appendChild(botonBorrar);
        celda.appendChild(botonModificar);
        return celda;
    }

    function abrirModalCrearContacto() {
        // boton crear
        let boton = document.getElementById('botonCrearModificar');
        boton.textContent = "Crear contacto";
        boton.classList = "";
        boton.classList.add('btn', 'btn-success');
        // cambiar titulo
        document.getElementById('tituloModal').textContent = "Crear contacto";
        //modificar submit
        document.getElementById('formulario').onsubmit = () => insertarContacto();
        //obtener datos
        document.getElementById('nombre').value = "";
        document.getElementById('apellidos').value = "";
        document.getElementById('correo').value = "";
        document.getElementById('telf').value = "";
        //abrir modal
        bootstrap.Modal.getOrCreateInstance(document.getElementById('crearContactoModal')).show();
    }

    function abrirModalModificarContacto(numFila, datosContacto) {
        // boton modificar
        let boton = document.getElementById('botonCrearModificar');
        boton.textContent = "Modificar contacto";
        boton.classList = "";
        boton.classList.add('btn', 'btn-warning');
        // cambiar titulo
        document.getElementById('tituloModal').textContent = "Modificar contacto";
        //modificar submit
        document.getElementById('formulario').onsubmit = () => modificarContacto(numFila);
        //obtener datos
        document.getElementById('nombre').value = datosContacto[0];
        document.getElementById('apellidos').value = datosContacto[1];
        document.getElementById('correo').value = datosContacto[2];
        document.getElementById('telf').value = datosContacto[3];
        //abrir modal
        bootstrap.Modal.getOrCreateInstance(document.getElementById('crearContactoModal')).show();
    }

    function contactoModificadoError() {
        //Mostrar notificacion
        crearNotificacionError('No se ha modificado correctamente', 'Error Modificado');
        //elimnar Loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    //Funcion separada
    function crearNotificacion(mensaje, titulo) {

        let elementoNotificacion = document.getElementById('notificacion');
        if (!elementoNotificacion) return;

        let toast = bootstrap.Toast.getOrCreateInstance(elementoNotificacion);

        document.getElementById('mensajeNotificacion').textContent = mensaje;
        document.getElementById('tituloNotificacion').textContent = titulo;
        toast.show();
        // Ocultar después de 3 segundos
        setTimeout(() => toast.hide(), 3000);
    }

    function crearTablaContactosError() {
        crearNotificacionError('No se pudieron obtener los contactos', 'Error');
    }

    function eliminarLoader() {
        let loader = document.getElementById('loader');
        if (loader) loader.remove();
    }

    function eliminarTabla() {
        let tablaExistente = document.getElementById('tablaContactos');
        if (tablaExistente) tablaExistente.remove();
    }

    function insertarContacto() {
        //Obtener datos
        let nombre = document.getElementById('nombre').value;
        let apellidos = document.getElementById('apellidos').value;
        let correo = document.getElementById('correo').value;
        let telf = document.getElementById('telf').value;
        //cerrar Modal
        let myModalEl = document.getElementById('crearContactoModal');
        let modal = bootstrap.Modal.getInstance(myModalEl).hide(); // Returns a Bootstrap modal instance
        // Obtener referencia al contenedor
        contenedorContactos = document.getElementById('divContactos');
        if (!contenedorContactos) return;
        // Eliminar tabla existente
        eliminarLoader();

        contenedorContactos.innerHTML = '';      // Limpia mensajes residuales
        crearLoader('divContactos');

        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(contactoInsertadoOk)
            .withFailureHandler(contactoInsertadoError)  // nombre corregido
            .insertarContacto(nombre, apellidos, correo, telf);
    }

    function crearLoader(elementoPadre) {
        eliminarLoader();
        let padre = document.getElementById(elementoPadre);
        if (!padre) return;
        let loader = document.createElement('div');
        loader.id = 'loader';
        loader.classList.add('lds-ellipsis');
        for (let i = 0; i < 4; i++) loader.appendChild(document.createElement('div'));
        padre.appendChild(loader);
    }

    function modificarContacto(numFila) {
        //cerrar modal
        bootstrap.Modal.getOrCreateInstance(document.getElementById('crearContactoModal')).hide();
        //obtener nuevos datos a partir del formulario
        let nombre = document.getElementById('nombre').value;
        let apellidos = document.getElementById('apellidos').value;
        let correo = document.getElementById('correo').value;
        let telf = document.getElementById('telf').value;
        // Eliminar tabla existente
        eliminarTabla();
        eliminarLoader();
        crearLoader('divContactos');
        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(contactoModificadoOk)
            .withFailureHandler(contactoModificadoError)  // nombre corregido
            .modificarContacto(numFila, { nombre, apellidos, correo, telf });
    }


    function borrarContacto(numFila) {
        // Eliminar tabla existente
        eliminarTabla();
        eliminarLoader();
        crearLoader('divContactos');
        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(contactoBorradoOk)
            .withFailureHandler(contactoBorradoError)  // nombre corregido
            .borrarContacto(numFila);
    }

    function contactoBorradoOk() {
        // mostrar notificacion
        crearNotificacionOk('Contacto borrado correctamente', 'Contacto Ok');
        //eliminar loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    function contactoBorradoError() {
        //Mostrad notificacion
        crearNotificacionError('No se ha borrado correctamente', 'Error Contacto');
        //elimnar Loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    /// Modificado
    function contactoModificadoOk() {
        // mostrar notificacion
        crearNotificacionContacto('Contacto modificado correctamente', 'Modificado Ok');
        //eliminar loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    function importarContactos() {
        // Obtener referencia al contenedor
        contenedorContactos = document.getElementById('divContactos');
        if (!contenedorContactos) return;
        // Eliminar tabla existente
        eliminarTabla();
        eliminarLoader();

        contenedorContactos.innerHTML = '';      // Limpia mensajes residuales
        crearLoader('divContactos');
        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(contactosImportadosOk)
            .withFailureHandler(contactosImportadosError)  // nombre corregido
            .importarContactos();
    }

     function contactosImportadosOk() {
        // mostrar notificacion
        crearNotificacionOk('Contacto importado correctamente', 'Contacto Ok');
        //eliminar loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }

    function contactosImportadosError() {
        //Mostrad notificacion
        crearNotificacionError('No se ha importado correctamente', 'Error Contacto');
        //elimnar Loader
        eliminarLoader();
        //crear Tabla
        crearTablaContactos();
    }






</script>
