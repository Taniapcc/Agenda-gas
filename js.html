<script>
    // Variable global para el contenedor (o se pasa como parámetro)
    let contenedorContactos = null;
  
    function crearTablaContactos() {
        // Obtener referencia al contenedor
        contenedorContactos = document.getElementById('divContactos');
        if (!contenedorContactos) return;
       

        // Eliminar tabla existente
        eliminarTabla();
        eliminarLoader();

        contenedorContactos.innerHTML = '';      // Limpia mensajes residuales
        crearLoader('divContactos');

        // Mostrar spinner de carga
        //contenedorContactos.innerHTML = '<div class="text-center"><div class="spinner-border text-primary"></div><p>Cargando...</p></div>';

        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(crearTablaContactosOk)
            .withFailureHandler(crearTablaContactosError)  // nombre corregido
            .obtenerContactos();
    }

    function crearTablaContactosOk(obj) {
        // Validar datos
        if (!obj || obj.length === 0) {
            contenedorContactos.innerHTML = '<p class="alert alert-warning">No hay contactos.</p>';
            return;
        }

        // Crear tabla nueva
        let tabla = document.createElement('table');
        tabla.id = 'tablaContactos';
        let thead = document.createElement('thead');
        let tbody = document.createElement('tbody');

        obj.forEach((filaActual, i) => {
            let fila = document.createElement('tr');
            filaActual.forEach(celdaActual => {
                if (i === 0) {
                    let th = document.createElement('th');
                    th.textContent = celdaActual;
                    fila.appendChild(th);
                } else {
                    let td = document.createElement('td');
                    td.textContent = celdaActual;
                    fila.appendChild(td);
                }
            });
            if (i === 0) {
                thead.appendChild(fila);
            } else {
                tbody.appendChild(fila);
            }
        });

        // Estilos
        thead.classList.add('table-dark');
        tabla.classList.add('table', 'table-striped', 'border', 'border-4', 'table-dark','border-dark');
        tabla.appendChild(thead);
        tabla.appendChild(tbody);

        // Limpiar y mostrar
        contenedorContactos.innerHTML = '';
        contenedorContactos.appendChild(tabla);

        // Opcional: notificación de éxito
       
       crearNotificacionOk('Contactos cargados correctamente', 'Éxito');
      
    }

    function crearTablaContactosError() {
        
         crearNotificacionError('No se pudieron obtener los contactos', 'Error');
      }

    //Funcion separada
    function crearNotificacion(mensaje,titulo){
      
      let elementoNotificacion = document.getElementById('notificacion');
      if (!elementoNotificacion) return;

      let toast = bootstrap.Toast.getOrCreateInstance(elementoNotificacion);

      document.getElementById('mensajeNotificacion').textContent = mensaje;
      document.getElementById('tituloNotificacion').textContent = titulo;
      toast.show();
        // Ocultar después de 3 segundos
        setTimeout(() => toast.hide(), 3000);

    }

    //Crear Notificacion ok

    function crearNotificacionOk(mensaje,titulo){
       crearNotificacion(mensaje,titulo);
       crearIconNotificacionOk();
       crearColorNotificacion('--color-verde-oscuro');

    }

    //Crear Notificacion Error
    function crearNotificacionError(mensaje,titulo){
       crearNotificacion(mensaje,titulo);
       crearIconNotificacionError();
       crearColorNotificacion('--color-rojo-oscuro');

    }

      //Crear Notificacion Warning
    function crearNotificacionWarning(mensaje,titulo){
       crearNotificacion(mensaje,titulo);
       crearIconNotificacionWarning();
       crearColorNotificacion('--color-amarillo-oscuro');

    }

    //Crear iconos 
  
    function crearIconNotificacionOk(){
       document.getElementById('iconoNotificacion').className = '';
       document.getElementById('iconoNotificacion').classList.add('bi', 'bi-check-circle-fill');

    }

    function crearIconNotificacionError(){
       document.getElementById('iconoNotificacion').className= '';
       document.getElementById('iconoNotificacion').classList.add('bi', 'bi-x-circle-fill');                 
    }

    function crearIconNotificacionWarning(){
       document.getElementById('iconoNotificacion').className = '';
       document.getElementById('iconoNotificacion').classList.add('bi', 'bi-exclamation-triangle-fill');           
    }

    function crearColorNotificacion(color){
      let elementoNotificacion = document.getElementById('notificacion');
       elementoNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue(color);
      }

   function eliminarTabla(){
    let tablaExistente = document.getElementById('tablaContactos');
        if (tablaExistente) tablaExistente.remove();
   }

   function crearLoaderOld(elementoPadre) {
        eliminarLoader();
        let loader = document.createElement('div');
        loader.id = 'loader';
        loader.appendChild(document.createElement('div'));
        loader.appendChild(document.createElement('div'));
        loader.appendChild(document.createElement('div'));
        loader.appendChild(document.createElement('div'));
        loader.classList.add('lds-ellipsis');
        document.getElementById(elementoPadre).appendChild(loader);
    }

    function crearLoader(elementoPadre) {
        eliminarLoader();
        let padre = document.getElementById(elementoPadre);
        if (!padre) return;
        let loader = document.createElement('div');
        loader.id = 'loader';
        loader.classList.add('lds-ellipsis');
         for (let i = 0; i < 4; i++) loader.appendChild(document.createElement('div'));
        padre.appendChild(loader);
    }
    

    function eliminarLoader() {
        let loader = document.getElementById('loader');
        if (loader) loader.remove();

        }

</script>
