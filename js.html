<script>
    // Variable global para el contenedor (o se pasa como parámetro)
    let contenedorContactos = null;
    const NOTIFICACION_OK = 1;
    const NOTIFICACION_DANGER = 2;
    const NOTIFICACION_WARNING = 3;

    function crearTablaContactos() {
        // Obtener referencia al contenedor
        contenedorContactos = document.getElementById('divContactos');
        if (!contenedorContactos) return;

        // Eliminar tabla existente
        let tablaExistente = document.getElementById('tablaContactos');
        if (tablaExistente) tablaExistente.remove();

        // Mostrar spinner de carga
        contenedorContactos.innerHTML = '<div class="text-center"><div class="spinner-border text-primary"></div><p>Cargando...</p></div>';

        // Llamar a Google Apps Script
        google.script.run
            .withSuccessHandler(crearTablaContactosOk)
            .withFailureHandler(crearTablaContactosError)  // nombre corregido
            .obtenerContactos();
    }

    function crearTablaContactosOk(obj) {
        // Validar datos
        if (!obj || obj.length === 0) {
            contenedorContactos.innerHTML = '<p class="alert alert-warning">No hay contactos.</p>';
            return;
        }

        // Crear tabla nueva
        let tabla = document.createElement('table');
        tabla.id = 'tablaContactos';
        let thead = document.createElement('thead');
        let tbody = document.createElement('tbody');

        obj.forEach((filaActual, i) => {
            let fila = document.createElement('tr');
            filaActual.forEach(celdaActual => {
                if (i === 0) {
                    let th = document.createElement('th');
                    th.textContent = celdaActual;
                    fila.appendChild(th);
                } else {
                    let td = document.createElement('td');
                    td.textContent = celdaActual;
                    fila.appendChild(td);
                }
            });
            if (i === 0) {
                thead.appendChild(fila);
            } else {
                tbody.appendChild(fila);
            }
        });

        // Estilos
        thead.classList.add('table-dark');
        tabla.classList.add('table', 'table-striped', 'border', 'border-4', 'table-dark','border-dark');
        tabla.appendChild(thead);
        tabla.appendChild(tbody);

        // Limpiar y mostrar
        contenedorContactos.innerHTML = '';
        contenedorContactos.appendChild(tabla);

        // Opcional: notificación de éxito
        crearNotificacion('success', 'Contactos cargados correctamente', 'Éxito');
        //crearNotificacion(NOTIFICACION_OK, 'Contactos cargados correctamente', 'Éxito');
    }

    function crearTablaContactosError(error) {
        console.error('Error:', error);
        if (contenedorContactos) {
            contenedorContactos.innerHTML = '<p class="alert alert-danger">Error al cargar los contactos: ' + error.message + '</p>';
        }
        // Notificación de error
        crearNotificacion('danger', 'No se pudieron obtener los contactos', 'Error');
        //crearNotificacion(NOTIFICACION_DANGER, 'No se pudieron obtener los contactos', 'Error');
    }

    // Función de notificación mejorada
    function crearNotificacion(tipo, mensaje, titulo) {
        let elementoNotificacion = document.getElementById('notificacion');
        if (!elementoNotificacion) return;

        let toast = bootstrap.Toast.getOrCreateInstance(elementoNotificacion);
        let tituloEl = document.getElementById('tituloNotificacion');
        let mensajeEl = document.getElementById('mensajeNotificacion');
        let iconoEl = document.getElementById('iconoNotificacion');

        if (tituloEl) tituloEl.textContent = titulo;
        if (mensajeEl) mensajeEl.textContent = mensaje;

        // Cambiar ícono según tipo

        /*
        switch (tipo) {
            case NOTIFICACION_OK:
                {
                    iconoEl.className = '';
                    iconoEl.classList.add('bi', 'bi-check-circle-fill');
                    elementoNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-verde-oscuro');
                }
            case NOTIFICACION_DANGER:
                {
                    iconoEl.className = '';
                    iconoEl.classList.add('bi', 'bi-bug-fill');
                    elementoNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-rojo-oscuro');
                }
            case NOTIFICACION_WARNING:
                {
                    iconoEl.className = '';
                    iconoEl.classList.add('bi', 'bi-exclamation-triangle-fill');
                    elementoNotificacion.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-amarillo-oscuro');
                }
        }
        */

        if (iconoEl) {

            if (tipo === 'success') {
                iconoEl.classList.add('bi', 'bi-check-circle-fill', 'text-success');
            } else {
                iconoEl.classList.add('bi', 'bi-exclamation-triangle-fill', 'text-danger');
            }
        }

        // Cambiar color de fondo del toast (opcional, usa clases de Bootstrap)
        elementoNotificacion.classList.remove('bg-success', 'bg-danger');
        if (tipo === 'success') {
            elementoNotificacion.classList.add('bg-success', 'text-white');
        } else {
            elementoNotificacion.classList.add('bg-danger', 'text-white');
        }

        toast.show();
        // Ocultar después de 3 segundos
        setTimeout(() => toast.hide(), 3000);
    }
</script>
