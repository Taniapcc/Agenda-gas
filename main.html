<!-- Archivo Main.html -->
<main>
    <!--Botones superiores-->
    <div class="d-flex justify-content-center my-3">
        <!--botones-->
        <button type="button" class="btn btn-success m-2" onclick="crearTablaContactos()">Mostrar contactos</button>
        <!-- Button trigger modal -->

        <button type="button" class="btn btn-primary m-2" data-bs-toggle="modal" data-bs-target="#crearContactoModal">
            Nuevo Contacto
        </button>
    </div>

    <!-- Tabla de contactos -->
    <div class="container col-12 col-lg-6 d-flex justify-content-center" id="divContactos">
        <!-- <p class="text-muted">Cargando contactos...</p> -->
    </div>

    <!-- Notificaciones -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="notificacion" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="toast-header p-0">
                <div class="icono-notificacion">
                    <i id="iconoNotificacion"></i> <!-- CORREGIDO: antes faltaba la 'n' -->
                </div>
                <strong class="me-auto" id="tituloNotificacion"></strong>
                <button type="button" class="btn-close m-2" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="mensajeNotificacion"></div>
        </div>
    </div>

    <!--MODAL-->


    <!-- Modal -->
    <div class="modal fade" id="crearContactoModal" tabindex="-1" aria-labelledby="tituloCrearContactoModal"
        aria-hidden="true">

        <div class="modal-lg modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloCrearContactoModal">Nuevo Contacto</h5>
                    <!--<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>!-->
                </div>
                <!--formulario de crear contactos-->
                <form onsubmit="insertarContacto()" method="dialog" id="formulario">

                    <div class="modal-body">

                        <!--Nombres y apellidos-->

                        <div class="row mb-3">

                            <div class="col-4">
                                <label for="nombre" class="form-label">Nombres: </label>
                                <input type="text" class="form-control" name="nombre" id="nombre" pattern="[^0-9]*" title="El nombre no puede contener números" required> 
                            </div>

                            <div class="col-8">
                                <label for="apellidos" class="form-label">Apellidos: </label>
                                <input type="text" class="form-control" name="apellidos" id="apellidos" pattern="[^0-9]*" title="El apellido no puede contener números" required>
                            </div>
                        </div>

                        <!-- Correo y Teléfono-->
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" class="form-control me-4" name="correo" id="correo" required>

                            <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                            <input type="tel" class="form-control" name="telf" id="telf" pattern="[\d]{9,11}" title="El teléfono debe contener entre 9 y11 dígitos numéricos" required>



                        </div>

                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">Crear Contacto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
